<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="icon" href="{{ '/assets/jams-icon.png' | relative_url }}" sizes="96x96" type="image/png">
<link rel="apple-touch-icon" href="{{ '/assets/jams-icon.png' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/jams.css' | relative_url }}">
</head>
<body>

<nav class="site-nav">
  <div class="wrap">
    {% for item in site.nav %}
      <a href="{{ item.url }}"{% if page.url == item.url %} class="active"{% endif %}>{{ item.title }}</a>
    {% endfor %}
  </div>
</nav>

{{ content }}

{% if page.math %}
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
{% endif %}

<footer>
  <div class="wrap">
    JAMS is free software under the
    <a href="https://github.com/jamsframework/jams/blob/main/LICENSE">GNU LGPL v3</a>
    · <a href="https://github.com/jamsframework">GitHub</a>
    · <a href="{{ '/impressum/' | relative_url }}">Legal Notice &amp; Privacy Policy</a>
  </div>
</footer>

</body>
</html>
